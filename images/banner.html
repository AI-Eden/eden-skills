<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Eden-Skills Banner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        background: #06090f;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      /* ─── Banner Canvas ─────────────────────────────── */
      .banner {
        width: 1280px;
        height: 640px;
        background: #0b0f19;
        position: relative;
        overflow: hidden;
        display: flex;
        align-items: stretch;
        flex-shrink: 0;
      }

      /* ─── Atmospheric Glow Layers ────────────────────── */
      .atm-glow-left {
        position: absolute;
        top: -220px;
        left: -180px;
        width: 780px;
        height: 780px;
        background: radial-gradient(
          circle,
          rgba(0, 185, 255, 0.16) 0%,
          rgba(0, 130, 220, 0.09) 38%,
          transparent 68%
        );
        pointer-events: none;
      }

      .atm-glow-right {
        position: absolute;
        bottom: -300px;
        right: -60px;
        width: 720px;
        height: 720px;
        background: radial-gradient(
          circle,
          rgba(0, 255, 160, 0.07) 0%,
          rgba(0, 210, 120, 0.04) 35%,
          transparent 65%
        );
        pointer-events: none;
      }

      .atm-glow-center {
        position: absolute;
        top: 50%;
        left: 37%;
        transform: translate(-50%, -50%);
        width: 600px;
        height: 600px;
        background: radial-gradient(
          circle,
          rgba(0, 200, 255, 0.045) 0%,
          transparent 60%
        );
        pointer-events: none;
      }

      /* ─── Grid Texture ────────────────────────────────── */
      .grid-tex {
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(rgba(0, 200, 255, 0.028) 1px, transparent 1px),
          linear-gradient(90deg, rgba(0, 200, 255, 0.028) 1px, transparent 1px);
        background-size: 52px 52px;
        pointer-events: none;
      }

      /* Subtle scan-line band at the very bottom edge */
      .scanline-edge {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 3px;
        background: linear-gradient(
          90deg,
          transparent 0%,
          rgba(0, 210, 255, 0.22) 20%,
          rgba(0, 210, 255, 0.5) 50%,
          rgba(0, 210, 255, 0.22) 80%,
          transparent 100%
        );
        pointer-events: none;
      }

      /* ─── Left Panel ─────────────────────────────────── */
      .left-panel {
        width: 40%;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        z-index: 2;
        flex-shrink: 0;
      }

      .logo-wrap {
        position: relative;
        width: 340px;
        height: 340px;
        mask-image: radial-gradient(
          circle at center,
          black 52%,
          transparent 76%
        );
        -webkit-mask-image: radial-gradient(
          circle at center,
          black 52%,
          transparent 76%
        );
      }

      .logo-img {
        width: 340px;
        height: 340px;
        object-fit: contain;
        filter: drop-shadow(0 0 26px rgba(0, 195, 255, 0.75))
          drop-shadow(0 0 60px rgba(0, 195, 255, 0.32))
          drop-shadow(0 0 110px rgba(0, 160, 255, 0.15));
        animation: logoPulse 4.5s ease-in-out infinite;
      }

      @keyframes logoPulse {
        0%,
        100% {
          filter: drop-shadow(0 0 22px rgba(0, 195, 255, 0.7))
            drop-shadow(0 0 55px rgba(0, 195, 255, 0.28))
            drop-shadow(0 0 100px rgba(0, 160, 255, 0.12));
        }
        50% {
          filter: drop-shadow(0 0 28px rgba(0, 220, 255, 0.9))
            drop-shadow(0 0 70px rgba(0, 220, 255, 0.38))
            drop-shadow(0 0 120px rgba(0, 200, 255, 0.18));
        }
      }

      /* ─── Vertical Separator ─────────────────────────── */
      .v-sep {
        width: 1px;
        align-self: center;
        height: 380px;
        flex-shrink: 0;
        position: relative;
        z-index: 2;
        background: linear-gradient(
          180deg,
          transparent 0%,
          rgba(0, 200, 255, 0.12) 12%,
          rgba(0, 200, 255, 0.4) 38%,
          rgba(0, 200, 255, 0.55) 50%,
          rgba(0, 200, 255, 0.4) 62%,
          rgba(0, 200, 255, 0.12) 88%,
          transparent 100%
        );
      }

      .v-sep::after {
        content: "";
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: rgba(0, 225, 255, 0.85);
        box-shadow: 0 0 14px 4px rgba(0, 225, 255, 0.55);
      }

      /* ─── Right Panel ────────────────────────────────── */
      .right-panel {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding: 0 58px;
        position: relative;
        z-index: 2;
        gap: 0;
      }

      /* Eyebrow */
      .eyebrow {
        font-family: "JetBrains Mono", monospace;
        font-size: 10.5px;
        letter-spacing: 0.36em;
        color: rgba(0, 200, 255, 0.5);
        text-transform: uppercase;
        margin-bottom: 15px;
      }

      /* H-rule accent */
      .h-rule {
        width: 52px;
        height: 2px;
        background: linear-gradient(90deg, #00d0ff 0%, transparent 100%);
        margin-bottom: 18px;
        border-radius: 1px;
      }

      /* Main title */
      .main-title {
        font-family: "Syne", sans-serif;
        font-size: 74px;
        font-weight: 800;
        color: #ffffff;
        line-height: 1;
        letter-spacing: -0.03em;
        margin-bottom: 18px;
      }

      .title-accent {
        background: linear-gradient(135deg, #00cfff 0%, #00ff99 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      /* Subtitle */
      .subtitle {
        font-family: "JetBrains Mono", monospace;
        font-size: 14.5px;
        font-weight: 400;
        color: rgba(180, 220, 248, 0.7);
        line-height: 1.58;
        letter-spacing: 0.005em;
        margin-bottom: 30px;
        max-width: 430px;
      }

      /* Feature tags row */
      .tags-row {
        display: flex;
        gap: 11px;
        flex-wrap: wrap;
        margin-bottom: 34px;
      }

      .tag {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 6px 16px;
        border: 1px solid rgba(0, 205, 255, 0.33);
        border-radius: 4px;
        background: rgba(0, 205, 255, 0.07);
        color: #00d4ff;
        font-family: "JetBrains Mono", monospace;
        font-size: 12.5px;
        font-weight: 500;
        letter-spacing: 0.07em;
        position: relative;
      }

      .tag-dot {
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background: #00d4ff;
        box-shadow: 0 0 7px 2px rgba(0, 212, 255, 0.7);
        flex-shrink: 0;
      }

      /* Bottom divider */
      .bottom-rule {
        width: 100%;
        height: 1px;
        background: linear-gradient(
          90deg,
          rgba(0, 200, 255, 0.18) 0%,
          rgba(0, 200, 255, 0.06) 60%,
          transparent 100%
        );
        margin-bottom: 18px;
      }

      /* "Works with" row */
      .works-row {
        display: flex;
        align-items: center;
        gap: 0;
        flex-wrap: wrap;
      }

      .works-label {
        font-family: "JetBrains Mono", monospace;
        font-size: 9.5px;
        color: rgba(110, 145, 175, 0.42);
        letter-spacing: 0.22em;
        text-transform: uppercase;
        margin-right: 14px;
      }

      .tool-name {
        font-family: "JetBrains Mono", monospace;
        font-size: 10.5px;
        color: rgba(155, 195, 225, 0.52);
      }

      .tool-sep {
        display: inline-block;
        width: 3px;
        height: 3px;
        border-radius: 50%;
        background: rgba(0, 200, 255, 0.22);
        margin: 0 10px;
        vertical-align: middle;
      }

      /* Tool icon wrappers */
      .tool-icon {
        width: 14px;
        height: 14px;
        opacity: 0.45;
        vertical-align: middle;
        margin-right: 4px;
      }
    </style>
  </head>
  <body>
    <div class="banner">
      <!-- Atmosphere -->
      <div class="atm-glow-left"></div>
      <div class="atm-glow-right"></div>
      <div class="atm-glow-center"></div>
      <div class="grid-tex"></div>
      <div class="scanline-edge"></div>

      <!-- ── Left: Logo ──────────────────────────────── -->
      <div class="left-panel">
        <div class="logo-wrap">
          <img
            src="./eden-skills-logo.png"
            alt="Eden Skills Logo"
            class="logo-img"
          />
        </div>
      </div>

      <!-- ── Separator ───────────────────────────────── -->
      <div class="v-sep"></div>

      <!-- ── Right: Content ──────────────────────────── -->
      <div class="right-panel">
        <!-- Eyebrow label -->
        <div class="eyebrow">// AI Skills Manager</div>

        <!-- Accent rule -->
        <div class="h-rule"></div>

        <!-- H1 -->
        <h1 class="main-title">
          Eden<span class="title-accent">-Skills</span>
        </h1>

        <!-- H2 Subtitle -->
        <p class="subtitle">
          Deterministic &amp; Blazing-Fast<br />
          Skills Manager for AI Agents
        </p>

        <!-- Feature Tags -->
        <div class="tags-row">
          <span class="tag"><span class="tag-dot"></span>Self-Healing</span>
          <span class="tag"><span class="tag-dot"></span>Zero Runtime</span>
          <span class="tag"><span class="tag-dot"></span>Docker-Native</span>
        </div>

        <!-- Bottom rule -->
        <div class="bottom-rule"></div>

        <!-- Works with row -->
        <div class="works-row">
          <span class="works-label">Works with:</span>

          <!-- Claude Code -->
          <span class="tool-name">
            <!-- Anthropic A-mark SVG -->
            <svg
              class="tool-icon"
              viewBox="0 0 24 24"
              fill="rgba(200,180,120,0.75)"
              xmlns="http://www.w3.org/2000/svg"
              style="
                display: inline-block;
                vertical-align: middle;
                margin-right: 4px;
              "
            >
              <path
                d="M13.827 3.52h3.603L24 20h-3.603l-6.57-16.48zm-3.654 0H6.57L0 20h3.603l1.357-3.415h7.83l-1.356-3.415H6.57l2.57-6.44 1.033 3.415z"
              />
            </svg>
            Claude Code
          </span>

          <span class="tool-sep"></span>

          <!-- Cursor -->
          <span class="tool-name">
            <svg
              class="tool-icon"
              viewBox="0 0 24 24"
              fill="rgba(150,200,255,0.75)"
              xmlns="http://www.w3.org/2000/svg"
              style="
                display: inline-block;
                vertical-align: middle;
                margin-right: 4px;
              "
            >
              <path d="M11.97 0L23.94 6.93v13.86L11.97 24 0 20.79V6.93z" />
            </svg>
            Cursor
          </span>

          <span class="tool-sep"></span>

          <!-- Codex / OpenAI -->
          <span class="tool-name">
            <!-- OpenAI logo SVG -->
            <svg
              class="tool-icon"
              viewBox="0 0 24 24"
              fill="rgba(180,220,180,0.75)"
              xmlns="http://www.w3.org/2000/svg"
              style="
                display: inline-block;
                vertical-align: middle;
                margin-right: 4px;
              "
            >
              <path
                d="M22.282 9.821a5.985 5.985 0 0 0-.516-4.91 6.046 6.046 0 0 0-6.51-2.9A6.065 6.065 0 0 0 4.981 4.18a5.985 5.985 0 0 0-3.998 2.9 6.046 6.046 0 0 0 .743 7.097 5.98 5.98 0 0 0 .51 4.911 6.051 6.051 0 0 0 6.515 2.9A5.985 5.985 0 0 0 13.26 24a6.056 6.056 0 0 0 5.772-4.206 5.99 5.99 0 0 0 3.997-2.9 6.056 6.056 0 0 0-.747-7.073zM13.26 22.43a4.476 4.476 0 0 1-2.876-1.04l.141-.081 4.779-2.758a.795.795 0 0 0 .392-.681v-6.737l2.02 1.168a.071.071 0 0 1 .038.052v5.583a4.504 4.504 0 0 1-4.494 4.494zM3.6 18.304a4.47 4.47 0 0 1-.535-3.014l.142.085 4.783 2.759a.771.771 0 0 0 .78 0l5.843-3.369v2.332a.08.08 0 0 1-.033.062L9.74 19.95a4.5 4.5 0 0 1-6.14-1.646zM2.34 7.896a4.485 4.485 0 0 1 2.366-1.973V11.6a.766.766 0 0 0 .388.676l5.815 3.355-2.02 1.168a.076.076 0 0 1-.071 0l-4.83-2.786A4.504 4.504 0 0 1 2.34 7.896zm16.597 3.855l-5.843-3.367L15.115 7.2a.076.076 0 0 1 .071 0l4.83 2.791a4.494 4.494 0 0 1-.676 8.105v-5.678a.79.79 0 0 0-.403-.667zm2.01-3.023l-.141-.085-4.774-2.782a.776.776 0 0 0-.785 0L9.409 9.23V6.897a.066.066 0 0 1 .028-.061l4.83-2.787a4.5 4.5 0 0 1 6.68 4.66zm-12.64 4.135l-2.02-1.164a.08.08 0 0 1-.038-.057V6.075a4.5 4.5 0 0 1 7.375-3.453l-.142.08L8.704 5.46a.795.795 0 0 0-.393.681zm1.097-2.365l2.602-1.5 2.607 1.5v2.999l-2.597 1.5-2.607-1.5Z"
              />
            </svg>
            Codex
          </span>

          <span class="tool-sep"></span>

          <!-- Windsurf -->
          <span class="tool-name">
            <!-- Wave/surf SVG icon -->
            <svg
              class="tool-icon"
              viewBox="0 0 24 24"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
              style="
                display: inline-block;
                vertical-align: middle;
                margin-right: 4px;
              "
            >
              <path
                d="M2 16c2-4 4-6 7-6 3.5 0 5 3 8 3 1.5 0 2.5-.5 3-1"
                stroke="rgba(160,200,255,0.75)"
                stroke-width="2"
                stroke-linecap="round"
              />
              <path
                d="M2 11c2-3 4-4.5 7-4.5 3.5 0 5 2.5 8 2.5 1.5 0 2.5-.4 3-.8"
                stroke="rgba(100,170,255,0.55)"
                stroke-width="1.5"
                stroke-linecap="round"
              />
            </svg>
            Windsurf
          </span>

          <span class="tool-sep"></span>

          <span class="tool-name" style="color: rgba(110, 150, 185, 0.38)"
            >&amp; More</span
          >
        </div>
      </div>
    </div>
  </body>
</html>
