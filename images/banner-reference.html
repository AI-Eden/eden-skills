<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Eden-Skills README Banner</title>
    <!-- 引入 Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入现代极客字体: Outfit(无衬线主字体) 和 JetBrains Mono(等宽代码字体) -->
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Outfit:wght@300;400;600;800;900&display=swap"
      rel="stylesheet"
    />

    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              // 定义极深的藏青色背景
              darkbase: "#0B0F19",
            },
            fontFamily: {
              sans: ["Outfit", "sans-serif"],
              mono: ["JetBrains Mono", "monospace"],
            },
          },
        },
      };
    </script>

    <style>
      /* 容器硬编码为 1200x400，确保截图/导出时比例绝对精确 */
      .banner-container {
        width: 1200px;
        height: 400px;
        background-color: #0b0f19;
        /* 径向渐变模拟背景的发光点缀 */
        background-image:
          radial-gradient(
            circle at 20% 50%,
            rgba(56, 189, 248, 0.12) 0%,
            transparent 45%
          ),
          radial-gradient(
            circle at 80% 80%,
            rgba(16, 185, 129, 0.08) 0%,
            transparent 45%
          ),
          radial-gradient(
            circle at 50% -20%,
            rgba(59, 130, 246, 0.1) 0%,
            transparent 50%
          );
      }

      /* Logo 外围的光晕效果 */
      .logo-glow {
        box-shadow:
          0 0 60px rgba(56, 189, 248, 0.3),
          inset 0 0 30px rgba(16, 185, 129, 0.2);
      }

      /* 主标题的渐变文字效果 */
      .text-gradient {
        background-clip: text;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-image: linear-gradient(135deg, #ffffff 30%, #a5f3fc 100%);
      }

      /* 赛博朋克点状网格背景 */
      .bg-grid {
        background-image: url("data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyMCIgaGVpZ2h0PSIyMCI+CjxwYXRoIGQ9Ik0xOSAyMEgxOXYtMWgxem0tMTktMUgwdjFoMXoiIGZpbGw9InJnYmEoMjU1LDI1NSwyNTUsMC4wNCkiLz4KPC9zdmc+");
      }
    </style>
  </head>
  <body class="bg-gray-950 flex items-center justify-center min-h-screen p-8">
    <!-- ================= BANNER 容器 ================= -->
    <!-- 使用 relative 和 overflow-hidden 裁剪内部特效 -->
    <div
      class="banner-container relative flex rounded-2xl shadow-[0_20px_60px_-15px_rgba(0,0,0,0.8)] border border-white/5 overflow-hidden"
    >
      <!-- 背景网格遮罩 -->
      <div class="absolute inset-0 bg-grid opacity-70"></div>

      <!-- =============== 左侧: Logo 区域 (约 40%) =============== -->
      <div class="w-[40%] flex items-center justify-center relative z-10 pl-6">
        <div class="relative group">
          <!-- 底层环境光 -->
          <div
            class="absolute -inset-2 bg-gradient-to-r from-cyan-500 to-emerald-500 rounded-full blur-xl opacity-20"
          ></div>

          <!-- Logo 图片 
             * mix-blend-screen 将黑色背景滤除，完美融入暗色系背景
             * onerror 提供容错占位符，防止本地图片加载失败时布局崩溃
        -->
          <img
            src="eden-skills-logo.jpg"
            alt="Eden Skills Logo"
            class="relative w-64 h-64 rounded-full object-cover logo-glow border border-cyan-500/20 mix-blend-screen"
            onerror="
              this.onerror = null;
              this.src = './eden-skills-logo.png';
              this.classList.remove('mix-blend-screen');
            "
          />
        </div>
      </div>

      <!-- =============== 右侧: 文本与排版区域 (约 60%) =============== -->
      <div
        class="w-[60%] flex flex-col justify-center pl-4 pr-16 py-12 relative z-10"
      >
        <!-- 主标题 -->
        <h1
          class="text-[3.5rem] font-black tracking-tight text-white mb-3 text-gradient font-sans leading-none drop-shadow-lg"
        >
          Eden-Skills
        </h1>

        <!-- 副标题 -->
        <h2
          class="text-[1.35rem] font-semibold text-cyan-400 mb-8 max-w-2xl leading-snug drop-shadow"
        >
          Deterministic & Blazing-Fast <br />
          Skills Manager for AI Agents
        </h2>

        <!-- 特性标签 (Tags) -->
        <div class="flex flex-wrap gap-4 mb-10 font-mono">
          <!-- Tag 1: Self-Healing -->
          <span
            class="px-4 py-1.5 border border-emerald-500/40 bg-emerald-950/40 text-emerald-300 rounded-md text-sm font-semibold tracking-wide backdrop-blur-md shadow-[0_0_15px_rgba(16,185,129,0.15)] flex items-center gap-2"
          >
            <svg
              class="w-4 h-4 text-emerald-400"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"
              ></path>
            </svg>
            Self-Healing
          </span>

          <!-- Tag 2: Zero Runtime -->
          <span
            class="px-4 py-1.5 border border-cyan-500/40 bg-cyan-950/40 text-cyan-300 rounded-md text-sm font-semibold tracking-wide backdrop-blur-md shadow-[0_0_15px_rgba(6,182,212,0.15)] flex items-center gap-2"
          >
            <svg
              class="w-4 h-4 text-cyan-400"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M13 10V3L4 14h7v7l9-11h-7z"
              ></path>
            </svg>
            Zero Runtime
          </span>

          <!-- Tag 3: Docker-Native -->
          <span
            class="px-4 py-1.5 border border-blue-500/40 bg-blue-950/40 text-blue-300 rounded-md text-sm font-semibold tracking-wide backdrop-blur-md shadow-[0_0_15px_rgba(59,130,246,0.15)] flex items-center gap-2"
          >
            <svg
              class="w-4 h-4 text-blue-400"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"
              ></path>
            </svg>
            Docker-Native
          </span>
        </div>

        <!-- 底部小字: 工具链支持 (嵌入 SVG 矢量 Logo 图标) -->
        <div
          class="mt-auto flex items-center gap-3.5 text-[0.85rem] text-gray-400/80 font-medium font-sans"
        >
          <span
            class="mr-1 text-gray-500 uppercase tracking-wider text-xs font-bold"
            >Works with:</span
          >

          <!-- Claude (Anthropic 官方标志) -->
          <div class="flex items-center gap-1.5">
            <svg
              viewBox="0 0 24 24"
              class="w-4 h-4 fill-gray-400/80"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path
                d="M17.306 3.406h-3.414l5.356 17.188h3.31zm-6.264 0H7.72l-5.358 17.19h3.218l1.45-4.787h6.883l1.455 4.787h3.353zm-2.028 3.518h.04l2.583 8.528H7.135Z"
              />
            </svg>
            Claude
          </div>

          <span class="text-gray-700/50">•</span>

          <!-- Cursor (鼠标指针矢量图) -->
          <div class="flex items-center gap-1.5">
            <svg
              class="w-4 h-4 fill-gray-400/80"
              viewBox="0 0 24 24"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path
                d="M5.5 3L18.5 16L12.5 17.5L15.5 22.5L13.5 23.5L10.5 18.5L5.5 22.5V3Z"
              />
            </svg>
            Cursor
          </div>

          <span class="text-gray-700/50">•</span>

          <!-- Codex (OpenAI 官方标志) -->
          <div class="flex items-center gap-1.5">
            <svg
              viewBox="0 0 24 24"
              class="w-4 h-4 fill-gray-400/80"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path
                d="M22.2819 9.8211a5.9847 5.9847 0 0 0-.5157-4.9108 6.0462 6.0462 0 0 0-6.5098-2.9A6.0651 6.0651 0 0 0 4.9807 4.1818a5.9847 5.9847 0 0 0-3.9977 2.9 6.0462 6.0462 0 0 0 .7427 7.0966 5.98 5.98 0 0 0 .511 4.9107 6.051 6.051 0 0 0 6.5146 2.9001A5.9847 5.9847 0 0 0 13.2599 24a6.0557 6.0557 0 0 0 5.7718-4.2058 5.9894 5.9894 0 0 0 3.9977-2.9001 6.0557 6.0557 0 0 0-.7475-7.073zm-9.022 12.6081a4.4755 4.4755 0 0 1-2.8764-1.0408l.1419-.0804 4.7783-2.7582a.7948.7948 0 0 0 .3927-.6813v-6.7369l2.02 1.1686a.071.071 0 0 1 .038.052v5.5826a4.504 4.504 0 0 1-4.4945 4.4944zm-9.6607-4.1254a4.4708 4.4708 0 0 1-.5346-3.0137l.142.0852 4.783 2.7582a.7712.7712 0 0 0 .7806 0l5.8428-3.3685v2.3324a.0804.0804 0 0 1-.0332.0615L9.74 19.9502a4.4992 4.4992 0 0 1-6.1408-1.6464zM2.3408 7.8956a4.485 4.485 0 0 1 2.3655-1.9728V11.6a.7664.7664 0 0 0 .3879.6765l5.8144 3.3543-2.0201 1.1685a.0757.0757 0 0 1-.071 0l-4.8303-2.7865A4.504 4.504 0 0 1 2.3408 7.872zm16.5963 3.8558L13.1038 8.364 15.1192 7.2a.0757.0757 0 0 1 .071 0l4.8303 2.7913a4.4944 4.4944 0 0 1-.6765 8.1042v-5.6772a.79.79 0 0 0-.407-.667zm2.0107-3.0231l-.142-.0852-4.7735-2.7818a.7759.7759 0 0 0-.7854 0L9.409 9.2297V6.8974a.0662.0662 0 0 1 .0284-.0615l4.8303-2.7866a4.4992 4.4992 0 0 1 6.6802 4.66zM8.3065 12.863l-2.02-1.1638a.0804.0804 0 0 1-.038-.0567V6.0742a4.4992 4.4992 0 0 1 7.3757-3.4537l-.142.0805L8.704 5.459a.7948.7948 0 0 0-.3927.6813zm1.0976-2.3654l2.602-1.501 2.6067 1.501v3.002l-2.6067 1.501-2.602-1.501z"
              />
            </svg>
            Codex
          </div>

          <span class="text-gray-700/50">•</span>

          <!-- Windsurf (代码冲浪/波浪意象) -->
          <div class="flex items-center gap-1.5">
            <svg
              class="w-4 h-4 text-gray-400/80"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M3 15C3 15 5 13 8 13C11 13 13 17 16 17C19 17 21 15 21 15M3 9C3 9 5 7 8 7C11 7 13 11 16 11C19 11 21 9 21 9"
              />
            </svg>
            Windsurf & More
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
